packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
  - "!**/dist/**"
  - "!**/build/**"
  - "!**/.wrangler/**"

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: false
  workerd: true

catalog:
  prettier: ^3.9.5
  eslint: ^10.6.0

minimumReleaseAgeExclude:
  - prettier@3.9.5

# pnpm 11 reads project-level pnpm settings from this file.
# Keep dependency versions centralized through catalogs as the repo grows.
